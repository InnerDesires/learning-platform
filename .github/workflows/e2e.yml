name: E2E

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_DEV_PROJECT_ID }}
          parent: dev
          branch_name: ci/${{ github.run_id }}
          api_key: ${{ secrets.NEON_DEV_API_KEY }}

      - name: Seed E2E test data
        run: pnpm exec tsx tests/helpers/seedUser.ts
        env:
          NODE_OPTIONS: --no-deprecation
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Run E2E tests
        # Skip visual regression snapshot tests — baselines were taken on macOS
        # and will false-fail on Ubuntu due to font rendering differences.
        # Run `pnpm test:e2e:snapshots` locally to update them.
        run: pnpm test:e2e:ci
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          NEXT_PUBLIC_SERVER_URL: http://localhost:3100
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3100
          CRON_SECRET: ci-cron-secret
          PREVIEW_SECRET: ci-preview-secret

      - name: Cleanup E2E test data
        if: always()
        run: pnpm exec tsx tests/helpers/seedUser.ts cleanup
        env:
          NODE_OPTIONS: --no-deprecation
          DATABASE_URL: ${{ steps.neon.outputs.db_url_with_pooler }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Prepare Pages deployment
        if: failure() && hashFiles('playwright-report/index.html') != ''
        run: |
          mkdir -p /tmp/pages/reports/${{ github.run_id }}
          cp -r playwright-report/. /tmp/pages/reports/${{ github.run_id }}/
          touch /tmp/pages/.nojekyll

      - name: Deploy report to GitHub Pages
        if: failure() && hashFiles('playwright-report/index.html') != ''
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: /tmp/pages
          clean: false

      - name: Comment PR with report URL
        if: failure() && hashFiles('playwright-report/index.html') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- playwright-report -->'
            const body = `${marker}\n### Playwright Report\n\n[View failed E2E report](https://${context.repo.owner}.github.io/${context.repo.repo}/reports/${{ github.run_id }}/)`
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const existing = comments.find(c => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              })
            }

      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_DEV_PROJECT_ID }}
          branch: ci/${{ github.run_id }}
          api_key: ${{ secrets.NEON_DEV_API_KEY }}
