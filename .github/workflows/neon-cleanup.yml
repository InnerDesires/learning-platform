name: Delete Neon branch on PR close

on:
  pull_request:
    types: [closed]

jobs:
  delete-neon-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ancient-cell-80589995
          branch: ${{ github.head_ref }}
          api_key: ${{ secrets.NEON_API_KEY }}
